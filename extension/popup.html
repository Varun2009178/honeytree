<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Honeydew</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1 class="popup-title">Honeydew</h1>
      <p class="popup-subtitle">Cold DM Research for Job Seekers</p>
    </div>

    <div class="usage-section">
      <div class="usage-label">
        <span>Free researches</span>
        <span id="usage-text" class="usage-count">Loading...</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="hotkey-section">
      <div class="hotkey-label">Quick launch</div>
      <div class="hotkey-row">
        <kbd id="hotkey-display">⌘⇧H</kbd>
        <span class="hotkey-desc">on any LinkedIn profile</span>
      </div>
    </div>

    <div id="waitlist-section" class="waitlist-section" style="display:none">
      <p class="waitlist-msg">Want unlimited researches?</p>
      <div class="waitlist-row">
        <input type="email" id="waitlist-email" placeholder="your@email.com" />
        <button id="waitlist-btn">Join Waitlist</button>
      </div>
      <p id="waitlist-status" class="waitlist-status"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
